<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>La Segunda - Fix Final</title>
  <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
  <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
  <style>
    body { margin: 0; }
    df-messenger {
      z-index: 999;
      position: fixed;
      top: 0; bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      --df-messenger-chat-window-width: 80vw;
    }
  </style>
</head>
<body>

<df-messenger
    location="us-east1"
    project-id="l2-np-dialogflow2-us-es1-desa"
    agent-id="93ea4d6a-4948-41b7-a2a2-e6dc1a3a37d0"
    language-code="es">
  <df-messenger-chat chat-title="LaSegunda-clientes-v4"></df-messenger-chat>
</df-messenger>

<script>
  const dfMessenger = document.querySelector('df-messenger');
  const seenResponses = new Set();

  dfMessenger.addEventListener('df-response-received', function (event) {
    const responseId = event.detail?.raw?.responseId;
    if (!responseId || seenResponses.has(responseId)) return;
    seenResponses.add(responseId);

    const rawMessages = event.detail?.raw?.queryResult?.responseMessages;
    if (!rawMessages) return;

    rawMessages.forEach(msg => {
      if (msg.payload && msg.payload.actions) {
        const data = msg.payload;
        const action = data.actions[0];

        setTimeout(() => {
          dfMessenger.renderCustomCard([
            {
              "type": "info",
              "title": "",
              "subtitle": data.text || ""
            },
            {
              "type": "button",
              "icon": { "type": "link", "color": "#003366" },
              "text": action.text || "Ver más",
              "link": action.uri
            }
          ]);

          // Log para ver la estructura del shadow DOM y encontrar el wrapper
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              try {
                const chatEl = dfMessenger.querySelector('df-messenger-chat');
                const chatRoot = chatEl?.shadowRoot;
                if (!chatRoot) return;
                console.log('[DOM] shadow root children:', Array.from(chatRoot.children).map(el => el.tagName + ' ' + el.className));
                const wrapper = Array.from(chatRoot.querySelectorAll('*')).find(el => el.children.length >= 2 && el.tagName !== 'STYLE');
                if (!wrapper) return;
                console.log('[DOM] wrapper encontrado:', wrapper.tagName, wrapper.className);
                const children = Array.from(wrapper.children);
                if (children.length < 2) return;
                const last = children[children.length - 1];
                const secondLast = children[children.length - 2];
                wrapper.insertBefore(last, secondLast);
              } catch (e) {}
            });
          });
        }, 100);
      }
    });
  });
</script>
</body>
</html>
