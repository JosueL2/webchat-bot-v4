<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo La Segunda</title>
    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
    <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; }
        df-messenger {
            z-index: 999;
            position: fixed;
            bottom: 20px;
            right: 20px;
            --df-messenger-font-family: 'Google Sans', sans-serif;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>La Segunda Seguros</h1>
        <p>Entorno DESA - Fix Botones</p>
    </div>

    <df-messenger
        location="us-east1"
        project-id="l2-np-dialogflow2-us-es1-desa"
        agent-id="93ea4d6a-4948-41b7-a2a2-e6dc1a3a37d0"
        language-code="es">
        <df-messenger-chat chat-title="Asistente Virtual"></df-messenger-chat>
    </df-messenger>

    <script>
      const dfMessenger = document.querySelector('df-messenger');

      dfMessenger.addEventListener('df-response-received', function (event) {
        // 1. Verificación de seguridad para evitar el error de 'undefined'
        const queryResult = event.detail?.response?.queryResult || event.detail?.raw?.queryResult;
        if (!queryResult || !queryResult.responseMessages) return;

        const messages = queryResult.responseMessages;

        messages.forEach((msg) => {
          // 2. Si el mensaje trae el payload de 'actions', lo "traducimos" al formato que Google ama
          if (msg.payload && msg.payload.actions) {
            const data = msg.payload;
            const action = data.actions[0];

            console.log(">>> Transformando payload para evitar error de parser...");

            // 3. REESCRIBIMOS EL PAYLOAD: Convertimos a 'richContent' in-place
            // Esto hace que el widget lo renderice solo y en orden, sin usar renderCustomCard
            msg.payload = {
              richContent: [[
                {
                  "type": "info",
                  "title": "Gestión Disponible 📲", // Ponemos el título para que el parser no explote
                  "subtitle": data.text || ""
                },
                {
                  "type": "button",
                  "icon": { "type": "link", "color": "#003366" },
                  "text": action.text || "Continuar",
                  "link": action.uri
                }
              ]]
            };

            // 4. Matamos el texto original para que no se duplique
            msg.text = undefined;
          }
        });
      });
    </script>
</body>
</html>
