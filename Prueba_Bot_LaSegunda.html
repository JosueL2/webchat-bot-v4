<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Chatbot - La Segunda</title>
    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
    <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; }
        df-messenger {
            z-index: 999;
            position: fixed;
            bottom: 20px;
            right: 20px;
            --df-messenger-font-family: 'Google Sans', sans-serif;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Entorno de Pruebas v4</h1>
        <p>Fix de Error de 'queryResult'</p>
    </div>

    <df-messenger
        location="us-east1"
        project-id="l2-np-dialogflow2-us-es1-desa"
        agent-id="93ea4d6a-4948-41b7-a2a2-e6dc1a3a37d0"
        language-code="es">
        <df-messenger-chat chat-title="LaSegunda-clientes-v4"></df-messenger-chat>
    </df-messenger>

    <script>
    const dfMessenger = document.querySelector('df-messenger');
    
    dfMessenger.addEventListener('df-response-received', function (event) {
        // 1. Entramos a la "Caja Fuerte" (raw) porque el widget filtra los payloads
        const rawMessages = event.detail?.raw?.queryResult?.responseMessages;
        
        console.log("DEBUG: Revisando caja fuerte de mensajes...", rawMessages);

        if (!rawMessages) return;

        // 2. Buscamos el payload que tenga tus 'actions'
        rawMessages.forEach(msg => {
            let data = null;

            if (msg.payload && msg.payload.actions) {
                data = msg.payload;
            } else if (msg.text && msg.text.text && typeof msg.text.text[0] === 'string' && msg.text.text[0].includes('"actions"')) {
                try { data = JSON.parse(msg.text.text[0]); } catch (e) {}
            }

            if (data && data.actions) {
                console.log("DEBUG: ¡LO ENCONTRAMOS EN EL RAW! Transformando...", data);

                // 3. Creamos el formato de botón
                const richContent = [{
                    "type": "info",
                    "title": "Cotización Online 💻",
                    "subtitle": data.text || "Hacé clic para cotizar."
                },
                {
                    "type": "button",
                    "icon": { "type": "link", "color": "#003366" },
                    "text": data.actions[0].text || "Cotizar",
                    "link": data.actions[0].uri
                }];

                // 4. INYECTAMOS el mensaje directamente en el chat
                // Usamos renderCustomCard para que el widget no lo pueda ignorar
                dfMessenger.renderCustomCard(richContent);
            }
        });
    });
</script>
</body>
</html>
