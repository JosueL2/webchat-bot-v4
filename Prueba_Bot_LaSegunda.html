<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Chatbot - La Segunda</title>
    
    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
    <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>

    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; }
        
        df-messenger {
            z-index: 999;
            position: fixed;
            bottom: 20px;
            right: 20px;
            --df-messenger-font-family: 'Google Sans', sans-serif;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Entorno de Pruebas v4</h1>
        <p>Estado: <strong>Versión con Título (Estable)</strong></p>
    </div>

    <df-messenger
        location="us-east1"
        project-id="l2-np-dialogflow2-us-es1-desa"
        agent-id="93ea4d6a-4948-41b7-a2a2-e6dc1a3a37d0"
        language-code="es">
        <df-messenger-chat chat-title="LaSegunda-clientes-v4"></df-messenger-chat>
    </df-messenger>

    <script>
  const dfMessenger = document.querySelector('df-messenger');

  dfMessenger.addEventListener('df-response-received', function (event) {
    console.log("--- NUEVA RESPUESTA DETECTADA ---");
    
    // 1. Ver todo el objeto detallado para inspeccionar manualmente
    console.log("Respuesta Completa:", event.detail);

    // 2. Buscar en Webhook Payloads (donde Google suele esconder los links de CX)
    const webhookPayloads = event.detail?.response?.queryResult?.webhookPayloads;
    if (webhookPayloads) {
        console.log("¡PAYLOAD DE WEBHOOK ENCONTRADO!", webhookPayloads);
    }

    // 3. Buscar en la respuesta cruda (RAW)
    const rawMessages = event.detail?.raw?.queryResult?.responseMessages;
    if (rawMessages) {
        rawMessages.forEach((m, i) => {
            if (m.payload) {
                console.log(`¡PAYLOAD DETECTADO EN RAW (Mensaje ${i})!`, m.payload);
            }
        });
    }

    // 4. Si encontramos algo con 'actions', lo forzamos
    const allMsgs = rawMessages || event.detail?.response?.queryResult?.responseMessages || [];
    allMsgs.forEach(msg => {
        if (msg.payload && msg.payload.actions) {
            console.log(">>> TRANSFORMANDO BOTÓN...");
            const data = msg.payload;
            const action = data.actions[0];
            const card = [{
                "richContent": [[
                    { "type": "info", "title": "Gestión", "subtitle": data.text || "" },
                    { "type": "button", "icon": {"type": "link", "color": "#003366"}, "text": action.text, "link": action.uri }
                ]]
            }];
            dfMessenger.renderCustomCard(card);
        }
    });
  });
</script>
</body>
</html>
