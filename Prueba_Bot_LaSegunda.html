<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Chatbot - La Segunda</title>
    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
    <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; }
        df-messenger {
            z-index: 999;
            position: fixed;
            bottom: 20px;
            right: 20px;
            --df-messenger-font-family: 'Google Sans', sans-serif;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Entorno de Pruebas v4</h1>
        <p>Fix de Error de 'queryResult'</p>
    </div>

    <df-messenger
        location="us-east1"
        project-id="l2-np-dialogflow2-us-es1-desa"
        agent-id="93ea4d6a-4948-41b7-a2a2-e6dc1a3a37d0"
        language-code="es">
        <df-messenger-chat chat-title="LaSegunda-clientes-v4"></df-messenger-chat>
    </df-messenger>

    <script>
        const dfMessenger = document.querySelector('df-messenger');
        
        dfMessenger.addEventListener('df-response-received', function (event) {
            console.log("DEBUG: Estructura completa recibida:", event.detail);
            
            // Intentamos obtener los mensajes de forma segura (para CX o ES)
            let messages = [];
            if (event.detail && event.detail.response && event.detail.response.queryResult) {
                messages = event.detail.response.queryResult.responseMessages;
            } else if (event.detail && event.detail.messages) {
                messages = event.detail.messages;
            }

            if (!messages || messages.length === 0) {
                console.log("DEBUG: No se encontraron mensajes en la respuesta.");
                return;
            }

            for (let i = 0; i < messages.length; i++) {
                let msg = messages[i];
                let rawData = null;

                // Caso 1: El JSON está en payload.actions
                if (msg.payload && msg.payload.actions) {
                    rawData = msg.payload;
                } 
                // Caso 2: El JSON está como texto (lo que pasaba antes)
                else if (msg.text && msg.text.text && msg.text.text[0].includes('"actions"')) {
                    try {
                        rawData = JSON.parse(msg.text.text[0]);
                    } catch (e) { console.error("Error parseando texto como JSON", e); }
                }

                if (rawData && rawData.actions) {
                    console.log("DEBUG: Transformando Payload...");
                    const action = rawData.actions[0];
                    
                    // Inyectamos el formato que entiende el widget
                    messages[i] = {
                        payload: {
                            richContent: [[
                                {
                                    "type": "info",
                                    "title": "Cotización Online 💻",
                                    "subtitle": rawData.text || "Hacé clic abajo para cotizar."
                                },
                                {
                                    "type": "button",
                                    "icon": { "type": "link", "color": "#003366" },
                                    "text": action.text || "Cotizar",
                                    "link": action.uri
                                }
                            ]]
                        }
                    };
                }
            }
        });
    </script>
</body>
</html>
