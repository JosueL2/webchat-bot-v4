<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot La Segunda - Entorno DESA</title>
    
    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
    <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>

    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; }
        df-messenger {
            z-index: 999;
            position: fixed;
            bottom: 20px;
            right: 20px;
            --df-messenger-font-family: 'Google Sans', sans-serif;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>La Segunda Seguros</h1>
        <p>Entorno de Pruebas - Flujos con Botones</p>
    </div>

    <df-messenger
        location="us-east1"
        project-id="l2-np-dialogflow2-us-es1-desa"
        agent-id="93ea4d6a-4948-41b7-a2a2-e6dc1a3a37d0"
        language-code="es">
        <df-messenger-chat chat-title="Asistente Virtual"></df-messenger-chat>
    </df-messenger>

    <script>
      const dfMessenger = document.querySelector('df-messenger');

      dfMessenger.addEventListener('df-response-received', function (event) {
        // Acceso seguro a la respuesta pura de Dialogflow CX
        const rawMessages = event.detail?.raw?.queryResult?.responseMessages;
        if (!rawMessages) return;

        rawMessages.forEach(msg => {
          // Buscamos tu JSON que trae la propiedad 'actions'
          if (msg.payload && msg.payload.actions && msg.payload.actions.length > 0) {
            
            const data = msg.payload;
            const link = data.actions[0];

            console.log("DEBUG: Generando botón para:", link.text);

            // Estructura de Card limpia: SIN PROPIEDAD TITLE para que no aparezca el encabezado
            const richContent = [
              {
                "type": "info",
                "subtitle": data.text || "" // Aquí va tu texto: "Cotizá tu seguro..." o "Podés denunciar..."
              },
              {
                "type": "button",
                "icon": { "type": "link", "color": "#003366" },
                "text": link.text || "Ver más",
                "link": link.uri
              }
            ];

            // Forzamos el renderizado. 
            // IMPORTANTE: El parser de esta versión de df-messenger prefiere un array simple de componentes.
            try {
              setTimeout(() => {
                dfMessenger.renderCustomCard([richContent]); 
              }, 150);
            } catch (e) {
              console.error("Error en renderizado custom:", e);
            }
          }
        });
      });
    </script>
</body>
</html>
