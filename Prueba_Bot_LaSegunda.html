<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Chatbot - La Segunda</title>
    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
    <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; }
        df-messenger {
            z-index: 999;
            position: fixed;
            bottom: 20px;
            right: 20px;
            --df-messenger-font-family: 'Google Sans', sans-serif;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Entorno de Pruebas v4</h1>
        <p>Estado: <strong>Botones con Título Activos</strong></p>
    </div>

    <df-messenger
        location="us-east1"
        project-id="l2-np-dialogflow2-us-es1-desa"
        agent-id="93ea4d6a-4948-41b7-a2a2-e6dc1a3a37d0"
        language-code="es">
        <df-messenger-chat chat-title="LaSegunda-clientes-v4"></df-messenger-chat>
    </df-messenger>

    <script>
  const dfMessenger = document.querySelector('df-messenger');

  dfMessenger.addEventListener('df-response-received', function (event) {
    // 1. Extraemos los mensajes de la respuesta
    const messages = event.detail.response.queryResult.responseMessages;

    messages.forEach((msg) => {
      // 2. ¿Es el payload con acciones que me pasaste?
      if (msg.payload && msg.payload.actions) {
        const data = msg.payload;
        const action = data.actions[0];

        // 3. RECONSTRUCCIÓN: Creamos la estructura que el widget SÍ entiende (Rich Content)
        // Usamos un array de arrays [[ ]] porque así lo pide la documentación para renderizar
        const richPayload = [
          [
            {
              "type": "info",
              "title": "Gestión Online 📲", // Título genérico para que no falle el parser
              "subtitle": data.text || ""   // Tu texto: "Cotizá tu seguro..."
            },
            {
              "type": "button",
              "icon": {
                "type": "link",
                "color": "#003366"
              },
              "text": action.text || "Ver más", // Ejemplo: "Cotizar"
              "link": action.uri
            }
          ]
        ];

        // 4. EL TRUCO: Usamos la función nativa para renderizar la tarjeta
        // Esto evita el error de "undefined" porque le pasamos el formato exacto
        dfMessenger.renderCustomCard(richPayload);
        
        // 5. Opcional: Borramos el payload crudo para que no intente mostrar el JSON en el chat
        delete msg.payload;
      }
    });
  });
</script>
</body>
</html>
