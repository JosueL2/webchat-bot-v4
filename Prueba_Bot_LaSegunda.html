<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>La Segunda - Fix Final</title>
  <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
  <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
  <style>
    df-messenger {
      z-index: 999;
      position: fixed;
      bottom: 0; right: 0; top: 0;
      width: 350px;
    }
  </style>
</head>
<body>

<df-messenger
    location="us-east1"
    project-id="l2-np-dialogflow2-us-es1-desa"
    agent-id="93ea4d6a-4948-41b7-a2a2-e6dc1a3a37d0"
    language-code="es">
  <df-messenger-chat chat-title="LaSegunda-clientes-v4"></df-messenger-chat>
</df-messenger>

<script>
  const dfMessenger = document.querySelector('df-messenger');

  dfMessenger.addEventListener('df-response-received', function (event) {
    // 1. Obtenemos la referencia real a los mensajes
    const messages = event.detail?.response?.queryResult?.responseMessages;
    if (!messages) return;

    messages.forEach(msg => {
      // 2. Si el bot manda el JSON con 'actions'...
      if (msg.payload && msg.payload.actions) {
        
        const data = msg.payload;
        const action = data.actions[0];

        // --- AQUÍ ESTÁ EL ORIGEN DEL ERROR ---
        // Transformamos el mensaje en un mensaje de "texto" vacío.
        // Esto hace que el Parser de Google diga "ah, es un texto, lo sé renderizar" y no tire error.
        msg.text = { text: [""] }; 
        delete msg.payload; 

        // 3. Ahora que el parser está calmado, mandamos nuestra Card
        const cardPayload = [
          {
            "type": "info",
            "title": "La Segunda Seguros 📲",
            "subtitle": data.text || ""
          },
          {
            "type": "button",
            "icon": { "type": "link", "color": "#003366" },
            "text": action.text || "Ver más",
            "link": action.uri
          }
        ];

        // 4. Renderizado manual
        setTimeout(() => {
          dfMessenger.renderCustomCard(cardPayload);
        }, 50);
      }
    });
  });
</script>
</body>
</html>
